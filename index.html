<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тут нет душного текста</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #cceeff, #99ddff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 400px;
      width: 90%;
      position: relative;
      height: 300px; /* фиксированная высота для движения кнопки */
    }

    h1 {
      margin-bottom: 20px;
      color: #0077cc;
      font-size: 18px;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .buttons {
      position: relative;
      width: 100%;
      height: 120px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.2s;
      position: absolute; /* важно для движения кнопки "Нет" */
    }

    #yes {
      background: #0077cc;
      color: white;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
    }

    #yes:hover {
      transform: translateX(-50%) scale(1.1);
    }

    #no {
      background: #ddd;
      bottom: 0;
      left: 20px;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #0077cc;
      transform: rotate(45deg);
      opacity: 0.8;
      pointer-events: none;
      animation: floatUp 3s linear forwards;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(45deg); opacity: 0.8; }
      100% { transform: translateY(-300px) rotate(45deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Я просто хотела напомнить тебе, что тебя любят и возможно то что погубио отношения их и спасет) 💙</h1>
    <p>Пошли пройдемся, сожжем калории или где-то наедим?)</p>
    <div class="buttons">
      <button id="no">Нет</button>
      <button id="yes">Да</button>
    </div>
  </div>

  <script>
const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const buttons = document.querySelector(".buttons");

// 🏃 кнопка "Нет" УБЕГАЕТ
noBtn.addEventListener("mouseenter", () => {
const area = buttons.getBoundingClientRect();
const btnW = noBtn.offsetWidth;
const btnH = noBtn.offsetHeight;

const maxX = area.width - btnW;
const maxY = area.height - btnH;

const x = Math.random() * maxX;
const y = Math.random() * maxY;

noBtn.style.left = ${x}px;
noBtn.style.top = ${y}px;
});

// 💙 кнопка "Да"
yesBtn.addEventListener("click", () => {
for (let i = 0; i < 12; i++) {
const heart = document.createElement("div");
heart.className = "heart";
heart.style.left = yesBtn.offsetLeft + Math.random() * 60 + "px";
heart.style.top = yesBtn.offsetTop - 10 + "px";
buttons.appendChild(heart);
setTimeout(() => heart.remove(), 2500);
}

document.querySelector("h1").textContent = "Я знала 😘💖";
});
</script>

</body>
</html>
