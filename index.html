<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Открытка</title>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1GP5G7EVLM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-1GP5G7EVLM');
</script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
  position: relative;
}

/* Фон */
.bg-grid {
  position: fixed;
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 25%;
  z-index: 0;
  filter: brightness(0.7) blur(1px);
  animation: bgMove 20s linear infinite;
}

.bg-grid img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

@keyframes bgMove {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* Логотип фон */
.hero-bg {
  position: absolute;
  width: 400px;
  height: 400px;
  opacity: 0.08;
  background: url('https://upload.wikimedia.org/wikipedia/commons/3/35/Superman_S_symbol.svg') no-repeat center/contain;
  animation: float 6s ease-in-out infinite;
  z-index: 1;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* Карточка */
.card {
  background: rgba(255,255,255,0.95);
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  max-width: 600px;
  width: 90%;
  position: relative;
  z-index: 2;
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Лого */
.logo {
  width: 120px;
  margin-bottom: 20px;
  animation: logoFloat 3s ease-in-out infinite;
}

@keyframes logoFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Текст */
#typing {
  font-size: 18px;
  line-height: 1.6;
  white-space: pre-line;
}

/* Кнопка */
button {
  margin-top: 25px;
  padding: 14px 28px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  background: #0077cc;
  color: white;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* Сердечки */
.heart {
  position: absolute;
  width: 15px;
  height: 15px;
  background: red;
  transform: rotate(45deg);
  animation: floatUp 3s ease-out forwards;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 15px;
  height: 15px;
  background: red;
  border-radius: 50%;
}

.heart::before { top: -7px; left: 0; }
.heart::after { left: -7px; top: 0; }

@keyframes floatUp {
  0% {
    opacity: 1;
    transform: translateY(0) scale(1) rotate(45deg);
  }
  100% {
    opacity: 0;
    transform: translateY(-200px) scale(1.5) rotate(45deg);
  }
}
</style>
</head>

<body>

<div class="bg-grid">
  <img src="images/1.jpg">
  <img src="images/2.jpg">
  <img src="images/3.jpg">
  <img src="images/4.jpg">
  <img src="images/5.jpg">
  <img src="images/6.jpg">
  <img src="images/7.jpg">
  <img src="images/8.jpg">
  <img src="images/9.jpg">
  <img src="images/10.jpg">
  <img src="images/11.jpg">
  <img src="images/12.jpg">
  <img src="images/13.jpg">
  <img src="images/14.jpg">
  <img src="images/15.jpg">
  <img src="images/16.jpg">
</div>

<div class="hero-bg"></div>

<div class="card">
  <img class="logo" src="https://pngimg.com/uploads/superman/superman_PNG8.png">

  <p id="typing"></p>

  <button id="go">Текст заголовок 💫</button>
</div>

<script>
// печатающийся текст
const text = `Печатается какой-то текст💙`;

function typeText(element, text, speed = 35) {
  let i = 0;
  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

typeText(document.getElementById("typing"), text);

// кнопка
const btn = document.getElementById("go");

btn.addEventListener("click", () => {

  // аналитика
  if (typeof gtag === 'function') {
    gtag('event', 'go_click', {
      button_name: 'restart_love'
    });
  }

  document.querySelector(".card").innerHTML = `
    <h1>Текст 💙</h1>
    <p>текст</p>
  `;

  // сердечки
  for (let i = 0; i < 40; i++) {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = window.innerHeight + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 3000);
  }
});
</script>

</body>
</html>
