<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Тут нет душного текста</title>

  <!-- Google Tag Manager верхний скрипт -->
  <script>
  (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-TKJB3NRP');
  </script>

  <!-- CSS -->
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #cceeff, #99ddff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 400px;
      width: 90%;
      position: relative;
      height: 300px;
    }

    h1 {
      margin-bottom: 20px;
      color: #0077cc;
      font-size: 18px;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .buttons {
      position: relative;
      width: 100%;
      height: 80px;
      margin: 0 auto;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.2s;
      position: absolute;
      bottom: 0;
    }

    #yes {
      background: #0077cc;
      color: white;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    #yes:hover {
      transform: translateX(-50%) scale(1.1);
    }

    #no {
      background: #ddd;
      left: 20px;
    }
    
  </style>
</head>
<body>

  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TKJB3NRP"
    height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>

  <div class="card">
    <h1>Пошли пройдемся, сожжем калории или где-то наедим?)</h1>
    <div class="buttons">
      <button id="no">Нет</button>
      <button id="yes">Да</button>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");
    const buttons = document.querySelector(".buttons");

    // Кнопка "Нет" убегает
    noBtn.addEventListener("mouseenter", () => {
      const area = buttons.getBoundingClientRect();
      const btnW = noBtn.offsetWidth;
      const btnH = noBtn.offsetHeight;

      const maxX = area.width - btnW;
      const maxY = area.height - btnH;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    // Кнопка "Да" с уведомлением и сердечками
    yesBtn.addEventListener("click", () => {
      alert("Я очень рада 💙");

      if (window.dataLayer) {
        window.dataLayer.push({ event: "click_yes_button" });
      }

      for (let i = 0; i < 8; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.style.left = yesBtn.offsetLeft + Math.random() * 50 + "px";
        heart.style.top = yesBtn.offsetTop - 10 + "px";
        buttons.appendChild(heart);
        setTimeout(() => heart.remove(), 2500);
      }
    });
  </script>

</body>
</html>
