<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Love Me?</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffe6f0, #e6f0ff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Arial", sans-serif;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 320px;
      width: 90%;
    }

    .card img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      position: relative;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yes {
      background: #ff5fa2;
      color: white;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      background: #ddd;
      position: relative;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbG9vZnh6cGNjNGF0bWQ2b2l4NnE1eTdqM2N1ZHZxN2ZsZHRkZCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/3oriO0OEd9QIDdllqo/giphy.gif">
    <h1>Ты меня любишь? 💕</h1>

    <div class="buttons">
      <button id="no">Нет</button>
      <button id="yes">Да</button>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");

    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * 200 - 100;
      const y = Math.random() * 200 - 100;
      noBtn.style.transform = translate(${x}px, ${y}px);
    });

    yesBtn.addEventListener("click", () => {
      document.body.innerHTML = "<h1 style='color:#ff5fa2'>Я знала 😘💖</h1>";
    });
  </script>

</body>
</html>
