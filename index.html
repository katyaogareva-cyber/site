<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Открытка</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #cceeff, #99ddff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 400px;
      width: 90%;
      position: relative;
    }

    h1 {
      margin-bottom: 20px;
      color: #0077cc;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      position: relative;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    #yes {
      background: #0077cc;
      color: white;
    }

    #yes:hover {
      transform: scale(1.1);
    }

    #no {
      background: #ddd;
      position: relative;
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #0077cc;
      transform: rotate(45deg);
      opacity: 0.8;
      pointer-events: none;
      animation: floatUp 3s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(45deg); opacity: 0.8; }
      100% { transform: translateY(-300px) rotate(45deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>]Я просто хотела напомнить тебе что тебя любят и возможно то что погубио отношения их и спасет) 💙</h1>
    <p>Пошли пройдемся сожжем калории или где-то наедим?)</p>
    <div>
      <img src="https://upload.wikimedia.org/wikipedia/en/3/35/Supermanflying.png" alt="Superman">
      <img src="https://upload.wikimedia.org/wikipedia/en/8/87/StarWarslogo.png" alt="Star Wars">
    </div>
    <div class="buttons">
      <button id="no">Нет</button>
      <button id="yes">Да</button>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");

    // Кнопка "Нет" убегает
    noBtn.addEventListener("mouseover", () => {
      const x = Math.random() * 200 - 100;
      const y = Math.random() * 100 - 50;
      noBtn.style.transform = translate(${x}px, ${y}px);
    });

    // Кнопка "Да" создает сердечки
    yesBtn.addEventListener("click", () => {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = yesBtn.getBoundingClientRect().top + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 3000);
      // Можно добавить сообщение
      document.querySelector("h1").textContent = "Я знала 😘💖";
    });
  </script>

</body>
</html>
