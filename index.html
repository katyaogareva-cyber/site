<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Моя открытка</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #ffe6f0, #e6f0ff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: "Arial", sans-serif;
      overflow: hidden;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      max-width: 350px;
      width: 90%;
      position: relative;
    }

    h1 {
      margin-bottom: 20px;
      color: #ff5fa2;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
      background: #ff5fa2;
      color: white;
    }

    button:hover {
      transform: scale(1.1);
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: #ff5fa2;
      transform: rotate(45deg);
      opacity: 0.8;
      pointer-events: none;
      animation: floatUp 3s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) rotate(45deg); opacity: 0.8; }
      100% { transform: translateY(-300px) rotate(45deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Привет! 💖</h1>
    <p>Я просто хотела напомнить тебе о наших тёплых моментах. 🌸</p>
    <button id="heartBtn">Нажми меня 💌</button>
  </div>

  <script>
    const heartBtn = document.getElementById("heartBtn");

    heartBtn.addEventListener("click", () => {
      // Создаём сердечко
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = heartBtn.getBoundingClientRect().top + "px";
      document.body.appendChild(heart);

      // Удаляем сердечко через 3 секунды
      setTimeout(() => heart.remove(), 3000);
    });
  </script>

</body>
</html>
