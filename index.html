<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Прогулка</title>

<!-- Google tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-1GP5G7EVLM"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-1GP5G7EVLM');
</script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;

  /* Анимированный фон */
  background: linear-gradient(270deg, #4facfe, #00f2fe, #43e97b);
  background-size: 600% 600%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* Большой фон логотипа */
.hero-bg {
  position: absolute;
  width: 400px;
  height: 400px;
  opacity: 0.08;
  background: url('https://upload.wikimedia.org/wikipedia/commons/3/35/Superman_S_symbol.svg') no-repeat center/contain;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

/* Карточка */
.card {
  background: white;
  padding: 40px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  max-width: 420px;
  width: 90%;
  position: relative;
  z-index: 2;
}

/* Логотип внутри */
.logo {
  width: 120px;
  margin-bottom: 20px;
  animation: logoFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 15px rgba(255,0,0,0.6));
}

@keyframes logoFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

h1 {
  color: #0077cc;
  font-size: 22px;
  margin-bottom: 20px;
}

p {
  font-size: 16px;
  margin-bottom: 30px;
}

/* Кнопка */
button {
  padding: 14px 28px;
  font-size: 18px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  background: #0077cc;
  color: white;
  transition: 0.3s;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

button:hover {
  transform: scale(1.1);
  background: #005fa3;
}

/* Сердечки */
.heart {
  position: absolute;
  width: 15px;
  height: 15px;
  background: red;
  transform: rotate(45deg);
  animation: floatUp 2.5s linear forwards;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 15px;
  height: 15px;
  background: red;
  border-radius: 50%;
}

.heart::before {
  top: -7px;
  left: 0;
}

.heart::after {
  left: -7px;
  top: 0;
}

@keyframes floatUp {
  0% {
    opacity: 1;
    transform: translateY(0) rotate(45deg);
  }
  100% {
    opacity: 0;
    transform: translateY(-120px) rotate(45deg);
  }
}
</style>
</head>

<body>

<div class="hero-bg"></div>

<div class="card">
  <img class="logo" src="https://pngimg.com/uploads/superman/superman_PNG8.png" alt="superman">

  <h1>Есть одна идея 😉</h1>
  <p>Готов(-а) к маленькому приключению?</p>

  <button id="go">Поехали 🚀</button>
</div>

<script>
const btn = document.getElementById("go");
const card = document.querySelector(".card");

btn.addEventListener("click", () => {
  alert("Тогда собирайся 😎");

  if (typeof gtag === 'function') {
    gtag('event', 'go_click', {
      button_name: 'go'
    });
  }

  for (let i = 0; i < 12; i++) {
    const heart = document.createElement("div");
    heart.className = "heart";

    heart.style.left = Math.random() * 250 + "px";
    heart.style.top = "220px";

    card.appendChild(heart);
    setTimeout(() => heart.remove(), 2500);
  }
});
</script>

</body>
</html>
